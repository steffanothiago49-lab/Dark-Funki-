<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNF Battle</title>
<style>
body{ margin:0; background:black; overflow:hidden; font-family:Arial; color:white; }
.container{ display:flex; justify-content:space-around; align-items:center; height:100vh; background:linear-gradient(to bottom,#240046,#000814); }
.character{ text-align:center; animation:bounce 0.6s infinite alternate; }
.character img{ width:300px; border-radius:20px; border:4px solid cyan; box-shadow:0 0 30px cyan; }
.enemy img{ border-color:magenta; box-shadow:0 0 30px magenta; }
.vs{ font-size:80px; font-weight:bold; color:red; text-shadow:0 0 20px red; }
button{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:15px 30px; font-size:20px; border:none; border-radius:15px; background:linear-gradient(to right,purple,cyan); color:white; cursor:pointer; }
@keyframes bounce{ from{ transform:translateY(0px); } to{ transform:translateY(-20px); } }
</style>
</head>
<body>
<div class="container">
    <div class="character enemy">
        <img src="https://picsum.photos/400/400?random=1">
        <h1>Dark Funkin'</h1>
    </div>
    <div class="vs">VS</div>
    <div class="character">
        <img src="https://picsum.photos/400/400?random=2">
        <h1>Red X</h1>
    </div>
</div>
<button onclick="playMusic()">▶ Reproducir Música</button>
<audio id="music" loop>
    <source src="./fnf_style_song.wav" type="audio/wav">
</audio>
<script>
function playMusic(){
    const music = document.getElementById('music');
    music.play().then(() => { console.log("Música iniciada"); }).catch(err => { console.log('Error:', err); });
}
</script>
</body>
</html>
